name: Database Backup

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          mkdir -p backups
          DATE=$(date +%Y%m%d-%H%M%S)
          pg_dump "$DATABASE_URL" | gzip > backups/kadan-backup-$DATE.sql.gz
          echo "BACKUP_FILE=kadan-backup-$DATE.sql.gz" >> $GITHUB_ENV

      - name: Upload backup to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ env.BACKUP_FILE }}
          path: backups/${{ env.BACKUP_FILE }}
          retention-days: 30

      # Optional: Upload to cloud storage (example with AWS S3)
      # - name: Upload to S3
      #   env:
      #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     AWS_REGION: us-east-1
      #   run: |
      #     aws s3 cp backups/${{ env.BACKUP_FILE }} s3://your-backup-bucket/kadan/

      - name: Backup summary
        run: |
          echo "✓ Backup completed successfully"
          echo "File: ${{ env.BACKUP_FILE }}"
          ls -lh backups/${{ env.BACKUP_FILE }}
